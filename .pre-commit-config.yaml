---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
        exclude: ^(charts/extra-codeowners/templates/|mkdocs\.yml$)
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check
        language: system
        types: [python]
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types: [python]
      - id: uv-lock
        name: uv lock is current
        entry: uv lock --check
        language: system
        files: ^(pyproject\.toml|uv\.lock)$
        pass_filenames: false
      - id: actionlint
        name: actionlint
        entry: actionlint
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: false
      - id: yamllint
        name: yamllint
        entry: uv run yamllint
        language: system
        types: [yaml]
      - id: helm-lint
        name: helm lint
        entry: helm lint charts/extra-codeowners
        language: system
        files: ^charts/extra-codeowners/
        pass_filenames: false
      - id: chart-license
        name: chart license matches project license
        entry: cmp --silent LICENSE charts/extra-codeowners/LICENSE
        language: system
        files: ^(LICENSE|charts/extra-codeowners/LICENSE)$
        pass_filenames: false
      - id: markdownlint
        name: markdownlint-cli2
        entry: markdownlint-cli2
        language: system
        types: [markdown]
