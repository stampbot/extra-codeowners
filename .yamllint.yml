---
extends: default

ignore: |
  .venv/
  charts/extra-codeowners/templates/
  site/

rules:
  comments:
    min-spaces-from-content: 1
  document-start: disable
  empty-lines:
    max-end: 1
  line-length:
    max: 120
    level: warning
  truthy:
    allowed-values: ["true", "false", "on"]
    check-keys: false
