name: Release

on:
  push:
    tags:
      - v[0-9]*.[0-9]*.[0-9]*

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository }}
  UV_FROZEN: "true"

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate narrow OpenVEX scope
        run: jq -e -f .github/scripts/validate-openvex.jq .openvex.json >/dev/null

      - name: Set up uv
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
        with:
          version: "0.11.28" # uv runtime
          enable-cache: false

      - name: Validate tag and project version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release tags must point to a commit contained in main." >&2
            exit 1
          fi
          version="${REF_NAME#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must have the form vMAJOR.MINOR.PATCH"
            exit 1
          fi
          project_version="$(uv version --short)"
          if [[ "$project_version" != "$version" ]]; then
            echo "::error::Tag version $version does not match project version $project_version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Require an empty release-readiness milestone
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          python .github/scripts/release_readiness.py
          --repository "${GITHUB_REPOSITORY}"
          --commit "${GITHUB_SHA}"
          --run-id "${GITHUB_RUN_ID}"
          --summary "${GITHUB_STEP_SUMMARY}"

  python-distribution-proof:
    name: Build release Python distribution proof
    needs: validate
    permissions:
      contents: read
    uses: ./.github/workflows/python-distribution.yml

  quality:
    name: Verify release source
    needs: validate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.7-alpine@sha256:bb377b7239d2774ac8cc76f481596ce96c5a6b5e9d141f6d0a0ee371a6e7c0f2
        env:
          POSTGRES_DB: extra_codeowners_test
          POSTGRES_PASSWORD: extra_codeowners
          POSTGRES_USER: extra_codeowners
        options: >-
          --health-cmd "pg_isready --username=extra_codeowners --dbname=extra_codeowners_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
        with:
          version: "0.11.28" # uv runtime
          enable-cache: false

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.19.0

      - name: Install locked dependencies
        run: uv sync --all-groups --frozen

      - name: Verify Python source
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run mypy extra_codeowners tests \
            .github/scripts/build_release_spine.py \
            .github/scripts/container_evidence.py \
            .github/scripts/release_spine.py \
            .github/scripts/release_readiness.py

      - name: Run release tests
        env:
          TEST_POSTGRES_URL: >-
            postgresql+psycopg://extra_codeowners:extra_codeowners@127.0.0.1:5432/extra_codeowners_test
        run: >-
          uv run pytest
          --cov=extra_codeowners
          --cov-branch
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=85

      - name: Verify native PostgreSQL backup and restore
        env:
          EXTRA_CODEOWNERS_DATABASE_URL: >-
            postgresql+psycopg://extra_codeowners:extra_codeowners@127.0.0.1:5432/extra_codeowners_test
          PGHOST: 127.0.0.1
          PGPASSWORD: extra_codeowners
          PGPORT: "5432"
          PGUSER: extra_codeowners
          RESTORE_DATABASE: extra_codeowners_restore_test
          SOURCE_DATABASE: extra_codeowners_test
        run: |
          uv run python -m extra_codeowners database migrate
          .github/scripts/test-postgres-backup-restore.sh \
            'postgres:17.7-alpine@sha256:bb377b7239d2774ac8cc76f481596ce96c5a6b5e9d141f6d0a0ee371a6e7c0f2'

      - name: Build documentation in strict mode
        run: uv run mkdocs build --strict

      - name: Lint Helm chart
        run: |
          cmp --silent LICENSE charts/extra-codeowners/LICENSE
          helm lint charts/extra-codeowners

  security-scan:
    name: Scan release candidate (${{ matrix.architecture }})
    needs:
      - validate
      - python-distribution-proof
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: amd64
            platform: linux/amd64
          - architecture: arm64
            platform: linux/arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up exact proof-verification Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14.6"

      - name: Download the selected Python distribution
        id: python-distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.python-distribution-proof.outputs.artifact-id }}
          path: ${{ runner.temp }}/verified-python
          digest-mismatch: error

      - name: Verify the selected Python distribution
        env:
          DISTRIBUTION_DIRECTORY: ${{ steps.python-distribution.outputs.download-path }}
          WHEEL_SHA256: ${{ needs.python-distribution-proof.outputs.wheel-sha256 }}
          SELECTION_RECORD_SHA256: >-
            ${{ needs.python-distribution-proof.outputs.selection-record-sha256 }}
        run: >-
          python .github/scripts/build_python_artifacts.py verify-selection
          --directory "$DISTRIBUTION_DIRECTORY"
          --source-revision "$GITHUB_SHA"
          --wheel-sha256 "$WHEEL_SHA256"
          --selection-record-sha256 "$SELECTION_RECORD_SHA256"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          image: >-
            tonistiigi/binfmt:qemu-v10.2.3@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          cache-binary: false
          version: v0.35.0
          driver-opts: >-
            image=moby/buildkit:v0.30.0@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

      - name: Build release candidate without publishing
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          build-contexts: |
            verified-python=${{ steps.python-distribution.outputs.download-path }}
          context: .
          load: true
          platforms: ${{ matrix.platform }}
          push: false
          tags: extra-codeowners:release-candidate-${{ matrix.architecture }}
          cache-from: type=gha,scope=main
          build-args: |
            APPLICATION_SOURCE_REVISION=${{ github.sha }}
            APPLICATION_WHEEL_SHA256=${{ needs.python-distribution-proof.outputs.wheel-sha256 }}
            APPLICATION_SELECTION_RECORD_SHA256=${{ needs.python-distribution-proof.outputs.selection-record-sha256 }}
            VERSION=${{ needs.validate.outputs.version }}

      - name: Smoke test hardened release candidate
        run: >-
          bash .github/scripts/smoke-container.sh
          extra-codeowners:release-candidate-${{ matrix.architecture }}
          ${{ matrix.architecture }}
          extra-codeowners-release-smoke-${{ matrix.architecture }}

      - name: Inventory all high-severity vulnerabilities
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: extra-codeowners:release-candidate-${{ matrix.architecture }}
          fail-build: false
          only-fixed: false
          output-file: vulnerability-report-${{ matrix.architecture }}.json
          output-format: json
          severity-cutoff: high

      - name: Upload vulnerability inventory
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-vulnerability-report-${{ matrix.architecture }}
          path: vulnerability-report-${{ matrix.architecture }}.json
          if-no-files-found: error
          retention-days: 7

      - name: Enforce fixable high-severity vulnerability gate
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: extra-codeowners:release-candidate-${{ matrix.architecture }}
          fail-build: true
          only-fixed: true
          output-format: table
          severity-cutoff: high
          vex: .openvex.json

  publication-block:
    name: Keep tagged publication disabled
    needs: validate
    permissions: {}
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Keep tagged publication disabled pending isolated evidence collection
        run: |
          echo "::error::Tagged publication is blocked by https://github.com/stampbot/extra-codeowners/issues/28"
          exit 1

  python:
    name: Build and attest Python artifacts
    needs:
      - validate
      - quality
      - security-scan
      - image
      - publication-block
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
        with:
          version: "0.11.28" # uv runtime
          enable-cache: false

      - name: Install locked dependencies
        run: uv sync --all-groups --frozen

      - name: Build source and wheel distributions
        run: uv build

      - name: Attest Python artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign Python artifacts
        run: |
          for artifact in dist/*.whl dist/*.tar.gz; do
            cosign sign-blob --yes --bundle "${artifact}.sigstore.json" "${artifact}"
          done

      - name: Upload Python artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  image:
    name: Publish release image
    needs:
      - validate
      - quality
      - security-scan
      - publication-block
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          image: >-
            tonistiigi/binfmt:qemu-v10.2.3@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          cache-binary: false
          version: v0.35.0
          driver-opts: >-
            image=moby/buildkit:v0.30.0@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=Extra CODEOWNERS
            org.opencontainers.image.description=Delegated GitHub App approvals for CODEOWNERS policy

      - name: Build and push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:release-candidate-${{ github.sha }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=main
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ needs.validate.outputs.version }}

      - name: Extract per-platform SPDX SBOMs
        id: platforms
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          image="${IMAGE}@${DIGEST}"
          raw_manifest="$(docker buildx imagetools inspect "$image" --raw)"

          for architecture in amd64 arm64; do
            platform_digest="$(
              jq -er --arg architecture "$architecture" '
                [.manifests[]
                 | select(
                     .platform.os == "linux"
                     and .platform.architecture == $architecture
                   )]
                | if length == 1
                  then .[0].digest
                  else error("expected exactly one platform manifest")
                  end
              ' <<<"$raw_manifest"
            )"
            echo "${architecture}_digest=${platform_digest}" >> "$GITHUB_OUTPUT"

            docker buildx imagetools inspect "$image" \
              --format "{{ json (index .SBOM \"linux/${architecture}\").SPDX }}" \
              | jq -e 'select(.SPDXID == "SPDXRef-DOCUMENT")' \
              > "image-sbom-linux-${architecture}.spdx.json"
          done

      - name: Generate platform-source scan VEX
        env:
          AMD64_DIGEST: ${{ steps.platforms.outputs.amd64_digest }}
          ARM64_DIGEST: ${{ steps.platforms.outputs.arm64_digest }}
        run: |
          timestamp="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          amd64_product="${IMAGE}@${AMD64_DIGEST}"
          arm64_product="${IMAGE}@${ARM64_DIGEST}"
          jq \
            --arg document_id \
              "https://github.com/stampbot/extra-codeowners/security/vex/release-scan/${GITHUB_SHA}" \
            --arg amd64_product "$amd64_product" \
            --arg arm64_product "$arm64_product" \
            --arg timestamp "$timestamp" \
            '.["@id"] = $document_id
             | .timestamp = $timestamp
             | .statements |= map(
                 .timestamp = $timestamp
                 | .products = [
                     {
                       "@id": $amd64_product,
                       "subcomponents": [{"@id": "pkg:generic/python@3.14.6"}]
                     },
                     {
                       "@id": $arm64_product,
                       "subcomponents": [{"@id": "pkg:generic/python@3.14.6"}]
                     }
                   ]
               )' \
            .openvex.json > release-scan.openvex.json

      - name: Scan published amd64 candidate digest
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ env.IMAGE }}@${{ steps.platforms.outputs.amd64_digest }}
          fail-build: true
          only-fixed: true
          output-format: table
          severity-cutoff: high
          vex: release-scan.openvex.json

      - name: Scan published arm64 candidate digest
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ env.IMAGE }}@${{ steps.platforms.outputs.arm64_digest }}
          fail-build: true
          only-fixed: true
          output-format: table
          severity-cutoff: high
          vex: release-scan.openvex.json

      - name: Generate digest-bound OpenVEX document
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          timestamp="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          product="pkg:oci/extra-codeowners@${DIGEST}"
          jq \
            --arg document_id \
              "https://github.com/stampbot/extra-codeowners/security/vex/v${VERSION}/python-3.14.6" \
            --arg product "$product" \
            --arg timestamp "$timestamp" \
            '.["@id"] = $document_id
             | .timestamp = $timestamp
             | .statements |= map(
                 .timestamp = $timestamp
                 | .products = [{
                     "@id": $product,
                     "subcomponents": [{"@id": "pkg:generic/python@3.14.6"}]
                   }]
               )' \
            .openvex.json > "extra-codeowners-${VERSION}.openvex.json"

      - name: Attest image provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Attest amd64 image SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.platforms.outputs.amd64_digest }}
          sbom-path: image-sbom-linux-amd64.spdx.json
          push-to-registry: true
          create-storage-record: false

      - name: Attest arm64 image SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.platforms.outputs.arm64_digest }}
          sbom-path: image-sbom-linux-arm64.spdx.json
          push-to-registry: true
          create-storage-record: false

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image and security metadata
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"
          cosign attest --yes \
            --type openvex \
            --predicate "extra-codeowners-${VERSION}.openvex.json" \
            "${IMAGE}@${DIGEST}"
          for sbom in image-sbom-linux-*.spdx.json; do
            cosign sign-blob --yes \
              --bundle "${sbom}.sigstore.json" \
              "$sbom"
          done
          cosign sign-blob --yes \
            --bundle "extra-codeowners-${VERSION}.openvex.json.sigstore.json" \
            "extra-codeowners-${VERSION}.openvex.json"

      - name: Upload SBOM and VEX
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-security-metadata
          path: |
            image-sbom-linux-*.spdx.json
            image-sbom-linux-*.spdx.json.sigstore.json
            extra-codeowners-*.openvex.json
            extra-codeowners-*.openvex.json.sigstore.json
          if-no-files-found: error
          retention-days: 7

      - name: Add release tags to the verified image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          RELEASE_TAGS: ${{ steps.metadata.outputs.tags }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          immutable_tag="${IMAGE}:${VERSION}"
          while IFS= read -r tag; do
            if [[ -z "$tag" ]]; then
              continue
            fi
            existing_digest="$(
              docker buildx imagetools inspect "$tag" 2>/dev/null \
                | awk '$1 == "Digest:" { print $2; exit }' \
                || true
            )"
            if [[ "$tag" == "$immutable_tag" \
              && -n "$existing_digest" \
              && "$existing_digest" != "$DIGEST" ]]; then
              echo "Refusing to move existing release tag $tag from $existing_digest." >&2
              exit 1
            fi
            if [[ "$existing_digest" == "$DIGEST" ]]; then
              continue
            fi
            docker buildx imagetools create \
              --tag "$tag" \
              "${IMAGE}@${DIGEST}"
            tagged_digest=""
            for _ in $(seq 1 10); do
              tagged_digest="$(
                docker buildx imagetools inspect "$tag" 2>/dev/null \
                  | awk '$1 == "Digest:" { print $2; exit }' \
                  || true
              )"
              if [[ "$tagged_digest" == "$DIGEST" ]]; then
                break
              fi
              sleep 2
            done
            if [[ "$tagged_digest" != "$DIGEST" ]]; then
              echo "Release tag $tag resolved to $tagged_digest, expected $DIGEST." >&2
              exit 1
            fi
          done <<< "$RELEASE_TAGS"

  chart:
    name: Package and publish Helm chart
    needs:
      - validate
      - quality
      - security-scan
      - image
      - publication-block
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.19.0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Lint and package chart
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          old_image='image: ghcr.io/stampbot/extra-codeowners:[^[:space:]]*'
          new_image="image: ghcr.io/stampbot/extra-codeowners:${VERSION}"
          sed -i "s#${old_image}#${new_image}#" charts/extra-codeowners/Chart.yaml
          sed -i \
            "s/--version 0\.1\.0/--version ${VERSION}/g" \
            charts/extra-codeowners/README.md
          helm lint charts/extra-codeowners
          mkdir -p dist
          helm package charts/extra-codeowners \
            --version "$VERSION" \
            --app-version "$VERSION" \
            --destination dist

      - name: Attest chart package
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/extra-codeowners-*.tgz

      - name: Sign chart package
        run: |
          for chart in dist/*.tgz; do
            cosign sign-blob --yes --bundle "${chart}.sigstore.json" "${chart}"
          done

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push chart to OCI registry
        run: helm push dist/extra-codeowners-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Sign chart in OCI registry
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: >-
          cosign sign --yes
          "ghcr.io/${{ github.repository_owner }}/charts/extra-codeowners:${VERSION}"

      - name: Upload chart artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: helm-chart
          path: dist/
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub release
    needs:
      - python
      - image
      - chart
      - publication-block
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: release-artifacts

      - name: Download image security metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image-security-metadata
          path: release-artifacts

      - name: Download Helm chart
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: helm-chart
          path: release-artifacts

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          artifacts=()
          while IFS= read -r -d '' artifact; do
            artifacts+=("$artifact")
          done < <(find release-artifacts -type f -print0)
          if (( ${#artifacts[@]} == 0 )); then
            echo "No release artifacts were downloaded." >&2
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" "${artifacts[@]}" \
            --generate-notes \
            --verify-tag
