name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  UV_FROZEN: "true"

jobs:
  lint:
    name: Lint and type check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate narrow OpenVEX scope
        run: jq -e -f .github/scripts/validate-openvex.jq .openvex.json >/dev/null

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
        with:
          version: "0.11.28" # uv runtime
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Verify lockfile is current
        env:
          # The workflow-wide frozen mode skips freshness resolution.
          UV_FROZEN: "false"
        run: uv lock --check

      - name: Install locked dependencies
        run: uv sync --all-groups --frozen

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint Python
        run: uv run ruff check .

      - name: Type check
        run: >-
          uv run mypy extra_codeowners tests
          .github/scripts/build_python_artifacts.py
          .github/scripts/build_python_distribution_spine.py
          .github/scripts/build_release_spine.py
          .github/scripts/container_evidence.py
          .github/scripts/github_release_api.py
          .github/scripts/immutable_release_preflight.py
          .github/scripts/python_distribution_spine.py
          .github/scripts/release_controller.py
          .github/scripts/release_spine.py
          .github/scripts/release_readiness.py

      - name: Lint YAML
        run: uv run yamllint .

      - name: Install pinned ShellCheck
        env:
          # Update this from the GitHub release asset digest in the same reviewed change.
          SHELLCHECK_SHA256: 8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198
          SHELLCHECK_VERSION: v0.11.0
        run: |
          archive="${RUNNER_TEMP}/shellcheck.tar.xz"
          release="https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}"
          curl --proto '=https' --tlsv1.2 \
            --fail --show-error --silent --location \
            --retry 3 --retry-all-errors \
            --output "${archive}" \
            "${release}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          printf '%s  %s\n' "${SHELLCHECK_SHA256}" "${archive}" | sha256sum --check --strict
          tar --extract --xz --file "${archive}" --directory "${RUNNER_TEMP}"
          printf '%s\n' "${RUNNER_TEMP}/shellcheck-${SHELLCHECK_VERSION}" >> "${GITHUB_PATH}"

      - name: Lint shell scripts
        run: >-
          shellcheck
          .github/scripts/smoke-container.sh
          .github/scripts/test-postgres-backup-restore.sh

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.12"
            coverage: true
            postgres: true
            test-postgres-url: >-
              postgresql+psycopg://extra_codeowners:extra_codeowners@127.0.0.1:5432/extra_codeowners_test
          - python-version: "3.13"
            coverage: false
            postgres: false
            test-postgres-url: ""
          - python-version: "3.14"
            coverage: false
            postgres: false
            test-postgres-url: ""
    services:
      postgres:
        # GitHub skips the service when this resolves to the empty string.
        image: >- # zizmor: ignore[unpinned-images] The only non-empty branch is digest-pinned.
          ${{ matrix.postgres &&
          'postgres:17.7-alpine@sha256:bb377b7239d2774ac8cc76f481596ce96c5a6b5e9d141f6d0a0ee371a6e7c0f2'
          || '' }}
        env:
          POSTGRES_DB: extra_codeowners_test
          POSTGRES_PASSWORD: extra_codeowners
          POSTGRES_USER: extra_codeowners
        options: >-
          --health-cmd "pg_isready --username=extra_codeowners --dbname=extra_codeowners_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
        with:
          version: "0.11.28" # uv runtime
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install locked dependencies
        run: uv sync --all-groups --frozen --python "${{ matrix.python-version }}"

      - name: Run tests with branch coverage
        if: matrix.coverage
        env:
          TEST_POSTGRES_URL: ${{ matrix.test-postgres-url }}
        run: >-
          uv run --python "${{ matrix.python-version }}" pytest
          --cov=extra_codeowners
          --cov-branch
          --cov-report=term-missing
          --cov-report=xml
          --cov-report=html
          --cov-fail-under=85

      - name: Run Python compatibility tests
        if: ${{ !matrix.coverage }}
        run: uv run pytest --no-cov

      - name: Verify native PostgreSQL backup and restore
        if: matrix.postgres
        env:
          EXTRA_CODEOWNERS_DATABASE_URL: ${{ matrix.test-postgres-url }}
          PGHOST: 127.0.0.1
          PGPASSWORD: extra_codeowners
          PGPORT: "5432"
          PGUSER: extra_codeowners
          RESTORE_DATABASE: extra_codeowners_restore_test
          SOURCE_DATABASE: extra_codeowners_test
        run: |
          uv run python -m extra_codeowners database migrate
          .github/scripts/test-postgres-backup-restore.sh \
            'postgres:17.7-alpine@sha256:bb377b7239d2774ac8cc76f481596ce96c5a6b5e9d141f6d0a0ee371a6e7c0f2'

      - name: Upload coverage report
        if: matrix.coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-python-3.12
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: error
          retention-days: 14

  docs:
    name: Documentation and Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Set up uv
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
        with:
          version: "0.11.28" # uv runtime
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install locked dependencies
        run: uv sync --all-groups --frozen

      - name: Build documentation in strict mode
        run: uv run mkdocs build --strict

      - name: Lint Markdown
        run: npx --yes markdownlint-cli2@0.20.0 '**/*.md' '#site/**' '#.venv/**'

  helm:
    name: Helm chart
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.19.0

      - name: Verify chart metadata and license
        run: |
          cmp --silent LICENSE charts/extra-codeowners/LICENSE
          project_version="$(awk -F'"' '
            $0 == "[project]" { in_project = 1; next }
            in_project && /^\[/ { exit }
            in_project && /^version = / { print $2; exit }
          ' pyproject.toml)"
          chart_version="$(helm show chart charts/extra-codeowners \
            | awk '$1 == "version:" {print $2}')"
          app_version="$(helm show chart charts/extra-codeowners \
            | awk '$1 == "appVersion:" {gsub(/"/, "", $2); print $2}')"
          if [[ "$chart_version" != "$project_version" || "$app_version" != "$project_version" ]]; then
            echo "Chart version, appVersion, and project version must match." >&2
            exit 1
          fi

      - name: Lint chart
        run: helm lint charts/extra-codeowners

      - name: Render default values
        run: |
          helm template extra-codeowners charts/extra-codeowners > rendered-default.yaml
          helm template extra-codeowners charts/extra-codeowners \
            --show-only templates/tests/test-connection.yaml > rendered-test.yaml
          if grep -Eq \
            '^[[:space:]]+app\.kubernetes\.io/(name|instance):' \
            rendered-test.yaml; then
            echo "Helm test Pod must not match the application Service selector." >&2
            exit 1
          fi

      - name: Render optional resources
        run: >-
          helm template extra-codeowners charts/extra-codeowners
          --set existingSecret=extra-codeowners-runtime
          --set ingress.enabled=true
          --set ingress.className=nginx
          --set autoscaling.enabled=true
          --set podDisruptionBudget.enabled=true
          --set allowInsecureChanges=true
          > rendered-optional.yaml

      - name: Render mounted GitHub credentials
        run: >-
          helm template extra-codeowners charts/extra-codeowners
          --set existingSecret=extra-codeowners-runtime
          --set extraVolumes[0].name=github-credentials
          --set extraVolumes[0].secret.secretName=extra-codeowners-github
          --set extraVolumes[0].secret.defaultMode=288
          --set extraVolumeMounts[0].name=github-credentials
          --set extraVolumeMounts[0].mountPath=/run/secrets/extra-codeowners
          --set extraVolumeMounts[0].readOnly=true
          --set migrations.existingSecret=extra-codeowners-database
          --set migrations.extraVolumes[0].name=database-ca
          --set migrations.extraVolumes[0].secret.secretName=extra-codeowners-database-ca
          --set migrations.extraVolumeMounts[0].name=database-ca
          --set migrations.extraVolumeMounts[0].mountPath=/run/secrets/database-ca
          --set migrations.extraVolumeMounts[0].readOnly=true
          > rendered-credentials.yaml

      - name: Verify workload selector and credential isolation
        run: |
          helm template extra-codeowners charts/extra-codeowners \
            --set existingSecret=extra-codeowners-runtime \
            --set extraVolumes[0].name=github-credentials \
            --set extraVolumes[0].secret.secretName=extra-codeowners-github \
            --set extraVolumeMounts[0].name=github-credentials \
            --set extraVolumeMounts[0].mountPath=/run/secrets/extra-codeowners \
            --set migrations.existingSecret=extra-codeowners-database \
            --set migrations.extraVolumes[0].name=database-ca \
            --set migrations.extraVolumes[0].secret.secretName=extra-codeowners-database-ca \
            --set migrations.extraVolumeMounts[0].name=database-ca \
            --set migrations.extraVolumeMounts[0].mountPath=/run/secrets/database-ca \
            --show-only templates/migration-job.yaml > rendered-migration-job.yaml
          helm template extra-codeowners charts/extra-codeowners \
            --show-only templates/service.yaml > rendered-service.yaml
          helm template extra-codeowners charts/extra-codeowners \
            --show-only templates/networkpolicy.yaml > rendered-network-policy.yaml
          helm template extra-codeowners charts/extra-codeowners \
            --show-only templates/deployment.yaml > rendered-deployment.yaml
          deployment_selector="$(awk '
            /^  selector:$/ { capture = 1 }
            capture { print }
            /^  template:$/ { exit }
          ' rendered-deployment.yaml)"
          grep -Fq 'app.kubernetes.io/instance: extra-codeowners' rendered-migration-job.yaml
          grep -Fq 'app.kubernetes.io/component: database-migration' rendered-migration-job.yaml
          grep -Fq 'enableServiceLinks: false' rendered-migration-job.yaml
          grep -Fq 'name: extra-codeowners-database' rendered-migration-job.yaml
          grep -Fq 'name: database-ca' rendered-migration-job.yaml
          grep -Fq 'app.kubernetes.io/component: application' rendered-service.yaml
          grep -Fq 'app.kubernetes.io/name: extra-codeowners' <<< "$deployment_selector"
          grep -Fq 'app.kubernetes.io/instance: extra-codeowners' <<< "$deployment_selector"
          grep -Fq 'app.kubernetes.io/component: application' rendered-deployment.yaml
          grep -Fq 'enableServiceLinks: false' rendered-deployment.yaml
          grep -Fq 'app.kubernetes.io/instance: extra-codeowners' rendered-network-policy.yaml
          if grep -Fq 'app.kubernetes.io/component:' <<< "$deployment_selector"; then
            echo 'Deployment immutable selector no longer matches the legacy release selector.' >&2
            exit 1
          fi
          if grep -Fq 'app.kubernetes.io/component:' rendered-network-policy.yaml; then
            echo 'NetworkPolicy no longer covers both application and migration pods.' >&2
            exit 1
          fi
          if grep -Eq 'extra-codeowners-(runtime|github)|github-credentials' \
            rendered-migration-job.yaml; then
            echo 'Migration Job inherited runtime GitHub credentials.' >&2
            exit 1
          fi

      - name: Render rolling-update opt-in
        run: >-
          helm template extra-codeowners charts/extra-codeowners
          --set deploymentStrategy.type=RollingUpdate
          --set deploymentStrategy.rollingUpdate.maxUnavailable=0
          --set deploymentStrategy.rollingUpdate.maxSurge=1
          > rendered-rolling-update.yaml

      - name: Reject chart-managed environment overrides
        run: |
          reject_values() {
            description="$1"
            shift
            if helm template extra-codeowners charts/extra-codeowners \
              "$@" >/dev/null 2>&1; then
              echo "Chart accepted unsafe values: ${description}." >&2
              exit 1
            fi
          }

          reject_values "insecure-mode environment override" \
            --set-string extraEnv[0].name=EXTRA_CODEOWNERS_ALLOW_INSECURE_CHANGES \
            --set-string extraEnv[0].value=true
          reject_values "runtime-environment override" \
            --set-string extraEnv[0].name=EXTRA_CODEOWNERS_ENVIRONMENT \
            --set-string extraEnv[0].value=development
          reject_values "migration hook override" \
            --set-string migrations.annotations.helm\\.sh/hook=post-install
          reject_values "migration environment override" \
            --set-string migrations.extraEnv[0].name=EXTRA_CODEOWNERS_ENVIRONMENT \
            --set-string migrations.extraEnv[0].value=development
          reject_values "migration temporary-volume override" \
            --set-string migrations.extraVolumes[0].name=tmp \
            --set-string migrations.extraVolumes[0].emptyDir={}
          reject_values "migration temporary-mount override" \
            --set-string migrations.extraVolumeMounts[0].name=other \
            --set-string migrations.extraVolumeMounts[0].mountPath=/tmp
          reject_values "pod selector-label override" \
            --set-string podLabels.app\\.kubernetes\\.io/name=hijack
          reject_values "pod component-label override" \
            --set-string podLabels.app\\.kubernetes\\.io/component=database-migration
          reject_values "temporary-volume override" \
            --set-string extraVolumes[0].name=tmp \
            --set-string extraVolumes[0].emptyDir={}
          reject_values "temporary-mount override" \
            --set-string extraVolumeMounts[0].name=other \
            --set-string extraVolumeMounts[0].mountPath=/tmp
          reject_values "rolling-update settings on Recreate" \
            --set deploymentStrategy.rollingUpdate.maxSurge=1

      - name: Validate Kubernetes resources
        run: >-
          docker run --rm
          --volume "${PWD}:/work:ro"
          ghcr.io/yannh/kubeconform:v0.7.0@sha256:85dbef6b4b312b99133decc9c6fc9495e9fc5f92293d4ff3b7e1b30f5611823c
          -kubernetes-version 1.27.0 -strict -summary
          /work/rendered-default.yaml
          /work/rendered-optional.yaml
          /work/rendered-credentials.yaml
          /work/rendered-rolling-update.yaml

      - name: Package chart
        run: helm package charts/extra-codeowners --destination /tmp

  python-distribution-proof:
    name: Build Python distribution proof
    permissions:
      contents: read
    uses: ./.github/workflows/python-distribution.yml

  python-distribution:
    name: Python distribution reproducibility
    needs: python-distribution-proof
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      artifact-id: ${{ steps.accept.outputs.artifact-id }}
      artifact-digest: ${{ steps.accept.outputs.artifact-digest }}
      wheel-sha256: ${{ steps.accept.outputs.wheel-sha256 }}
      selection-record-sha256: ${{ steps.accept.outputs.selection-record-sha256 }}
    steps:
      - name: Require a complete reusable distribution proof
        id: accept
        env:
          PROOF_RESULT: ${{ needs.python-distribution-proof.result }}
          ARTIFACT_ID: ${{ needs.python-distribution-proof.outputs.artifact-id }}
          ARTIFACT_DIGEST: ${{ needs.python-distribution-proof.outputs.artifact-digest }}
          WHEEL_SHA256: ${{ needs.python-distribution-proof.outputs.wheel-sha256 }}
          SELECTION_RECORD_SHA256: >-
            ${{ needs.python-distribution-proof.outputs.selection-record-sha256 }}
        run: |
          set -euo pipefail
          if [ "$PROOF_RESULT" != success ]; then
            echo "Reusable distribution proof result was $PROOF_RESULT, not success." >&2
            exit 1
          fi
          if ! [[ "$ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]; then
            echo "Reusable distribution proof returned an invalid artifact ID." >&2
            exit 1
          fi
          if ! [[ "$ARTIFACT_DIGEST" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Reusable distribution proof returned an invalid artifact digest." >&2
            exit 1
          fi
          if ! [[ "$WHEEL_SHA256" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Reusable distribution proof returned an invalid wheel digest." >&2
            exit 1
          fi
          if ! [[ "$SELECTION_RECORD_SHA256" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Reusable distribution proof returned an invalid selection-record digest." >&2
            exit 1
          fi
          {
            printf 'artifact-id=%s\n' "$ARTIFACT_ID"
            printf 'artifact-digest=%s\n' "$ARTIFACT_DIGEST"
            printf 'wheel-sha256=%s\n' "$WHEEL_SHA256"
            printf 'selection-record-sha256=%s\n' "$SELECTION_RECORD_SHA256"
          } >>"$GITHUB_OUTPUT"

  release-spine-transport-producer:
    name: Raw OCI release-spine producer
    needs: python-distribution
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      index-digest: ${{ steps.build-image.outputs.digest }}
      record-artifact-id: ${{ steps.upload-record.outputs.artifact-id }}
      record-artifact-digest: ${{ steps.upload-record.outputs.artifact-digest }}
      run-attempt: ${{ steps.identity.outputs.run-attempt }}
      run-id: ${{ steps.identity.outputs.run-id }}
      spine-artifact-id: ${{ steps.upload-spine.outputs.artifact-id }}
      spine-artifact-digest: ${{ steps.upload-spine.outputs.artifact-digest }}
      version: ${{ steps.identity.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Download the selected Python distribution by immutable ID
        id: selected-python
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.python-distribution.outputs.artifact-id }}
          path: ${{ runner.temp }}/verified-python
          digest-mismatch: error

      - name: Verify the selected Python distribution
        env:
          DISTRIBUTION_DIRECTORY: ${{ steps.selected-python.outputs.download-path }}
          SELECTION_RECORD_SHA256: >-
            ${{ needs.python-distribution.outputs.selection-record-sha256 }}
          WHEEL_SHA256: ${{ needs.python-distribution.outputs.wheel-sha256 }}
        run: >-
          python .github/scripts/build_python_artifacts.py verify-selection
          --directory "$DISTRIBUTION_DIRECTORY"
          --source-revision "$GITHUB_SHA"
          --wheel-sha256 "$WHEEL_SHA256"
          --selection-record-sha256 "$SELECTION_RECORD_SHA256"

      - name: Prepare immutable candidate identity
        id: identity
        env:
          CANDIDATE_REGISTRY: ghcr.io
          CANDIDATE_REPOSITORY: ${{ github.repository }}
          PYTHON_ARTIFACT_DIGEST: ${{ needs.python-distribution.outputs.artifact-digest }}
          PYTHON_ARTIFACT_ID: ${{ needs.python-distribution.outputs.artifact-id }}
          REPOSITORY_ID: ${{ github.repository_id }}
          REPOSITORY_NAME: ${{ github.repository }}
          SELECTION_RECORD_SHA256: >-
            ${{ needs.python-distribution.outputs.selection-record-sha256 }}
          WHEEL_SHA256: ${{ needs.python-distribution.outputs.wheel-sha256 }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          set -euo pipefail
          if ! [[ "$PYTHON_ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]; then
            echo "Selected Python artifact ID is invalid." >&2
            exit 1
          fi
          for digest in \
            "$PYTHON_ARTIFACT_DIGEST" "$WHEEL_SHA256" "$SELECTION_RECORD_SHA256"; do
            if ! [[ "$digest" =~ ^[0-9a-f]{64}$ ]]; then
              echo "Selected Python distribution digest is invalid." >&2
              exit 1
            fi
          done
          output="${RUNNER_TEMP}/release-spine"
          layout="${RUNNER_TEMP}/release-spine-layout-run-${GITHUB_RUN_ID}"
          layout="${layout}-attempt-${GITHUB_RUN_ATTEMPT}"
          if [ -e "$layout" ]; then
            echo "Refusing to overwrite an existing OCI layout." >&2
            exit 1
          fi
          install --directory --mode=0700 "$output"
          candidate_tag="release-candidate-${GITHUB_SHA}"
          candidate_name="${CANDIDATE_REGISTRY}/${CANDIDATE_REPOSITORY}:${candidate_tag}"
          version="$(python - <<'PY'
          import pathlib
          import tomllib

          project = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          print(project["project"]["version"])
          PY
          )"
          if ! [[ "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Project version is not an exact three-part release version." >&2
            exit 1
          fi
          basename="extra-codeowners-image-${GITHUB_SHA}"
          basename="${basename}-python-artifact-${PYTHON_ARTIFACT_ID}"
          basename="${basename}-run-${GITHUB_RUN_ID}-attempt-${GITHUB_RUN_ATTEMPT}"
          {
            printf 'candidate-name=%s\n' "$candidate_name"
            printf 'candidate-tag=%s\n' "$candidate_tag"
            printf 'layout-path=%s\n' "$layout"
            printf 'oci-output=type=oci,dest=%s,tar=false,name=%s\n' \
              "$layout" "$candidate_name"
            printf 'record-path=%s/%s.spine.json\n' "$output" "$basename"
            printf 'run-attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
            printf 'run-id=%s\n' "$GITHUB_RUN_ID"
            printf 'spine-path=%s/%s.bin\n' "$output" "$basename"
            printf 'version=%s\n' "$version"
          } >>"$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          cache-image: false
          image: >-
            tonistiigi/binfmt:qemu-v10.2.3@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0

      - name: Set up pinned Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          cache-binary: false
          version: v0.35.0
          driver-opts: >-
            image=moby/buildkit:v0.30.0@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

      - name: Export the real multi-platform OCI candidate
        id: build-image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
        with:
          build-contexts: |
            verified-python=${{ steps.selected-python.outputs.download-path }}
          build-args: |
            APPLICATION_SOURCE_REVISION=${{ github.sha }}
            APPLICATION_WHEEL_SHA256=${{ needs.python-distribution.outputs.wheel-sha256 }}
            APPLICATION_SELECTION_RECORD_SHA256=${{ needs.python-distribution.outputs.selection-record-sha256 }}
            VERSION=${{ steps.identity.outputs.version }}
          context: .
          outputs: ${{ steps.identity.outputs.oci-output }}
          platforms: linux/amd64,linux/arm64
          provenance: false
          push: false
          sbom: false
          target: runtime

      - name: Build bounded raw release artifacts
        env:
          CANDIDATE_REGISTRY: ghcr.io
          CANDIDATE_REPOSITORY: ${{ github.repository }}
          CANDIDATE_TAG: ${{ steps.identity.outputs.candidate-tag }}
          INDEX_DIGEST: ${{ steps.build-image.outputs.digest }}
          LAYOUT_PATH: ${{ steps.identity.outputs.layout-path }}
          PYTHON_ARTIFACT_DIGEST: ${{ needs.python-distribution.outputs.artifact-digest }}
          PYTHON_ARTIFACT_ID: ${{ needs.python-distribution.outputs.artifact-id }}
          RECORD_PATH: ${{ steps.identity.outputs.record-path }}
          REPOSITORY_ID: ${{ github.repository_id }}
          REPOSITORY_NAME: ${{ github.repository }}
          SELECTION_RECORD_SHA256: >-
            ${{ needs.python-distribution.outputs.selection-record-sha256 }}
          SPINE_PATH: ${{ steps.identity.outputs.spine-path }}
          VERSION: ${{ steps.identity.outputs.version }}
          WHEEL_SHA256: ${{ needs.python-distribution.outputs.wheel-sha256 }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          set -euo pipefail
          if ! [[ "$INDEX_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Pinned build action returned an invalid root digest." >&2
            exit 1
          fi
          python .github/scripts/build_release_spine.py \
            --layout "$LAYOUT_PATH" \
            --spine-output "$SPINE_PATH" \
            --record-output "$RECORD_PATH" \
            --repository-id "$REPOSITORY_ID" \
            --repository-name "$REPOSITORY_NAME" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --source-revision "$GITHUB_SHA" \
            --version "$VERSION" \
            --workflow-path .github/workflows/ci.yml \
            --workflow-ref "$WORKFLOW_REF" \
            --workflow-sha "$WORKFLOW_SHA" \
            --candidate-registry "$CANDIDATE_REGISTRY" \
            --candidate-repository "$CANDIDATE_REPOSITORY" \
            --candidate-tag "$CANDIDATE_TAG" \
            --index-digest "$INDEX_DIGEST" \
            --python-artifact-id "$PYTHON_ARTIFACT_ID" \
            --python-artifact-sha256 "$PYTHON_ARTIFACT_DIGEST" \
            --wheel-sha256 "$WHEEL_SHA256" \
            --selection-record-sha256 "$SELECTION_RECORD_SHA256"

      - name: Upload the raw spine bytes
        id: upload-spine
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ steps.identity.outputs.spine-path }}
          archive: false
          if-no-files-found: error
          retention-days: 1

      - name: Upload the raw spine record
        id: upload-record
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ steps.identity.outputs.record-path }}
          archive: false
          if-no-files-found: error
          retention-days: 1

  release-spine-transport-consumer:
    name: Raw OCI release-spine transport
    needs:
      - python-distribution
      - release-spine-transport-producer
    if: ${{ always() }}
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require a complete raw OCI release-spine producer
        shell: bash
        env:
          PRODUCER_RESULT: ${{ needs.release-spine-transport-producer.result }}
        run: |
          set -euo pipefail
          if [ "$PRODUCER_RESULT" != success ]; then
            echo "Raw OCI release-spine producer result was $PRODUCER_RESULT, not success." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Download the raw spine by immutable ID
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: >-
            ${{ needs.release-spine-transport-producer.outputs.spine-artifact-id }}
          path: ${{ runner.temp }}/downloaded-spine
          skip-decompress: true
          digest-mismatch: error

      - name: Download the raw record by immutable ID
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: >-
            ${{ needs.release-spine-transport-producer.outputs.record-artifact-id }}
          path: ${{ runner.temp }}/downloaded-record
          skip-decompress: true
          digest-mismatch: error

      - name: Verify the bounded raw transport
        shell: bash
        env:
          INDEX_DIGEST: ${{ needs.release-spine-transport-producer.outputs.index-digest }}
          PYTHON_ARTIFACT_DIGEST: ${{ needs.python-distribution.outputs.artifact-digest }}
          PYTHON_ARTIFACT_ID: ${{ needs.python-distribution.outputs.artifact-id }}
          PRODUCER_RUN_ATTEMPT: >-
            ${{ needs.release-spine-transport-producer.outputs.run-attempt }}
          PRODUCER_RUN_ID: ${{ needs.release-spine-transport-producer.outputs.run-id }}
          RECORD_ARTIFACT_DIGEST: >-
            ${{ needs.release-spine-transport-producer.outputs.record-artifact-digest }}
          REPOSITORY_ID: ${{ github.repository_id }}
          REPOSITORY_NAME: ${{ github.repository }}
          SELECTION_RECORD_SHA256: >-
            ${{ needs.python-distribution.outputs.selection-record-sha256 }}
          SPINE_ARTIFACT_DIGEST: >-
            ${{ needs.release-spine-transport-producer.outputs.spine-artifact-digest }}
          VERSION: ${{ needs.release-spine-transport-producer.outputs.version }}
          WHEEL_SHA256: ${{ needs.python-distribution.outputs.wheel-sha256 }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          set -euo pipefail
          if [ "$PRODUCER_RUN_ID" != "$GITHUB_RUN_ID" ]; then
            echo "Raw release-spine producer returned the wrong run ID." >&2
            exit 1
          fi
          for identifier in "$PYTHON_ARTIFACT_ID" "$PRODUCER_RUN_ID" "$PRODUCER_RUN_ATTEMPT"; do
            if ! [[ "$identifier" =~ ^[1-9][0-9]*$ ]]; then
              echo "Raw release-spine producer returned an invalid identity." >&2
              exit 1
            fi
          done
          candidate_tag="release-candidate-${GITHUB_SHA}"
          basename="extra-codeowners-image-${GITHUB_SHA}"
          basename="${basename}-python-artifact-${PYTHON_ARTIFACT_ID}"
          basename="${basename}-run-${PRODUCER_RUN_ID}-attempt-${PRODUCER_RUN_ATTEMPT}"
          python .github/scripts/release_spine.py verify \
            --record "${RUNNER_TEMP}/downloaded-record/${basename}.spine.json" \
            --spine "${RUNNER_TEMP}/downloaded-spine/${basename}.bin" \
            --record-artifact-sha256 "$RECORD_ARTIFACT_DIGEST" \
            --spine-artifact-sha256 "$SPINE_ARTIFACT_DIGEST" \
            --repository-id "$REPOSITORY_ID" \
            --repository-name "$REPOSITORY_NAME" \
            --run-id "$PRODUCER_RUN_ID" \
            --run-attempt "$PRODUCER_RUN_ATTEMPT" \
            --source-revision "$GITHUB_SHA" \
            --version "$VERSION" \
            --workflow-path .github/workflows/ci.yml \
            --workflow-ref "$WORKFLOW_REF" \
            --workflow-sha "$WORKFLOW_SHA" \
            --candidate-registry ghcr.io \
            --candidate-repository "$REPOSITORY_NAME" \
            --candidate-tag "$candidate_tag" \
            --index-digest "$INDEX_DIGEST" \
            --python-artifact-id "$PYTHON_ARTIFACT_ID" \
            --python-artifact-sha256 "$PYTHON_ARTIFACT_DIGEST" \
            --wheel-sha256 "$WHEEL_SHA256" \
            --selection-record-sha256 "$SELECTION_RECORD_SHA256"

  container:
    name: Container build (${{ matrix.architecture }})
    needs: python-distribution
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: amd64
            platform: linux/amd64
          - architecture: arm64
            platform: linux/arm64
    services:
      postgres:
        image: postgres:17.7-alpine@sha256:bb377b7239d2774ac8cc76f481596ce96c5a6b5e9d141f6d0a0ee371a6e7c0f2
        env:
          POSTGRES_DB: extra_codeowners_test
          POSTGRES_PASSWORD: extra_codeowners
          POSTGRES_USER: extra_codeowners
        options: >-
          --health-cmd "pg_isready --username=extra_codeowners --dbname=extra_codeowners_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Require the selected Python distribution
        env:
          DISTRIBUTION_RESULT: ${{ needs.python-distribution.result }}
        run: |
          if [ "$DISTRIBUTION_RESULT" != success ]; then
            echo "Python distribution selection result was $DISTRIBUTION_RESULT, not success." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python for evidence collection
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Download the selected Python distribution
        id: python-distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.python-distribution.outputs.artifact-id }}
          path: ${{ runner.temp }}/verified-python
          digest-mismatch: error

      - name: Verify the selected Python distribution
        env:
          DISTRIBUTION_DIRECTORY: ${{ steps.python-distribution.outputs.download-path }}
          WHEEL_SHA256: ${{ needs.python-distribution.outputs.wheel-sha256 }}
          SELECTION_RECORD_SHA256: >-
            ${{ needs.python-distribution.outputs.selection-record-sha256 }}
        run: >-
          python .github/scripts/build_python_artifacts.py verify-selection
          --directory "$DISTRIBUTION_DIRECTORY"
          --source-revision "$GITHUB_SHA"
          --wheel-sha256 "$WHEEL_SHA256"
          --selection-record-sha256 "$SELECTION_RECORD_SHA256"

      - name: Set up uv for evidence collection
        uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
        with:
          version: "0.11.28" # uv runtime
          enable-cache: false

      - name: Install locked evidence dependencies
        run: uv sync --all-groups --frozen

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          image: >-
            tonistiigi/binfmt:qemu-v10.2.3@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          cache-binary: false
          version: v0.35.0
          driver-opts: >-
            image=moby/buildkit:v0.30.0@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

      - name: Build container test target
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          build-contexts: |
            verified-python=${{ steps.python-distribution.outputs.download-path }}
          build-args: |
            APPLICATION_SOURCE_REVISION=${{ github.sha }}
            APPLICATION_WHEEL_SHA256=${{ needs.python-distribution.outputs.wheel-sha256 }}
            APPLICATION_SELECTION_RECORD_SHA256=${{ needs.python-distribution.outputs.selection-record-sha256 }}
          context: .
          load: true
          platforms: ${{ matrix.platform }}
          push: false
          target: test
          tags: extra-codeowners:test-${{ matrix.architecture }}

      - name: Run full suite in selected container runtime
        env:
          TEST_POSTGRES_URL: >-
            postgresql+psycopg://extra_codeowners:extra_codeowners@127.0.0.1:5432/extra_codeowners_test
        run: >-
          docker run --rm
          --platform ${{ matrix.platform }}
          --network host
          --env TEST_POSTGRES_URL
          extra-codeowners:test-${{ matrix.architecture }}

      - name: Build container without publishing
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          build-contexts: |
            verified-python=${{ steps.python-distribution.outputs.download-path }}
          context: .
          load: true
          platforms: ${{ matrix.platform }}
          push: false
          tags: extra-codeowners:ci-${{ matrix.architecture }}
          build-args: |
            APPLICATION_SOURCE_REVISION=${{ github.sha }}
            APPLICATION_WHEEL_SHA256=${{ needs.python-distribution.outputs.wheel-sha256 }}
            APPLICATION_SELECTION_RECORD_SHA256=${{ needs.python-distribution.outputs.selection-record-sha256 }}
            VERSION=0.0.0-ci

      - name: Smoke test hardened container
        run: >-
          bash .github/scripts/smoke-container.sh
          extra-codeowners:ci-${{ matrix.architecture }}
          ${{ matrix.architecture }}
          extra-codeowners-ci-smoke-${{ matrix.architecture }}

      - name: Collect and verify container distribution evidence
        env:
          ARCHITECTURE: ${{ matrix.architecture }}
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || github.sha }}
          PR_HEAD_REPOSITORY_ID: >-
            ${{ github.event.pull_request.head.repo.id || github.repository_id }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          PR_NUMBER: ${{ github.event.number || 0 }}
          PLATFORM: ${{ matrix.platform }}
          REPOSITORY_ID: ${{ github.repository_id }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
          PYTHON_DISTRIBUTION_DIRECTORY: ${{ steps.python-distribution.outputs.download-path }}
          PYTHON_DISTRIBUTION_ARTIFACT_ID: ${{ needs.python-distribution.outputs.artifact-id }}
          PYTHON_DISTRIBUTION_ARTIFACT_DIGEST: ${{ needs.python-distribution.outputs.artifact-digest }}
          APPLICATION_WHEEL_SHA256: ${{ needs.python-distribution.outputs.wheel-sha256 }}
          APPLICATION_SELECTION_RECORD_SHA256: >-
            ${{ needs.python-distribution.outputs.selection-record-sha256 }}
        run: |
          set -euo pipefail
          mkdir -p container-evidence
          image="extra-codeowners:ci-${ARCHITECTURE}"
          subject_digest="$(docker image inspect --format '{{.Id}}' "$image")"
          inventory="container-evidence/components-${ARCHITECTURE}.json"
          files="container-evidence/all-layer-files-${ARCHITECTURE}.json"
          bundle="container-evidence/extra-codeowners-ci-linux-${ARCHITECTURE}-evidence.tar.gz"
          predicate="container-evidence/evidence-predicate-${ARCHITECTURE}.json"
          uv run --frozen python .github/scripts/container_evidence.py inventory \
            --image "$image" \
            --platform "$PLATFORM" \
            --subject-digest "$subject_digest" \
            --output "$inventory" \
            --files-output "$files" \
            --allow-config-digest-subject
          checkout_sha="$(git rev-parse HEAD)"
          uv run --frozen python .github/scripts/container_evidence.py run-metadata \
            --inventory "$inventory" \
            --output "container-evidence/run-metadata-${ARCHITECTURE}.json" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --event-name "$EVENT_NAME" \
            --repository-id "$REPOSITORY_ID" \
            --pr-number "$PR_NUMBER" \
            --pr-head-sha "$PR_HEAD_SHA" \
            --pr-base-sha "$PR_BASE_SHA" \
            --pr-head-repository-id "$PR_HEAD_REPOSITORY_ID" \
            --github-sha "$GITHUB_SHA" \
            --checkout-sha "$checkout_sha" \
            --workflow-ref "$WORKFLOW_REF" \
            --workflow-sha "$WORKFLOW_SHA" \
            --platform "$PLATFORM" \
            --architecture "$ARCHITECTURE" \
            --python-distribution-artifact-id "$PYTHON_DISTRIBUTION_ARTIFACT_ID" \
            --python-distribution-artifact-digest "$PYTHON_DISTRIBUTION_ARTIFACT_DIGEST" \
            --application-source-revision "$GITHUB_SHA" \
            --application-wheel-sha256 "$APPLICATION_WHEEL_SHA256" \
            --application-selection-record-sha256 \
              "$APPLICATION_SELECTION_RECORD_SHA256"
          uv run --frozen python .github/scripts/container_evidence.py verify \
            --inventory "$inventory"
          uv run --frozen python .github/scripts/container_evidence.py bundle \
            --inventory "$inventory" \
            --files-inventory "$files" \
            --output "$bundle" \
            --predicate-output "$predicate" \
            --version 0.0.0-ci \
            --source-date-epoch "$(git show -s --format=%ct HEAD)" \
            --selected-python-directory "$PYTHON_DISTRIBUTION_DIRECTORY" \
            --application-source-revision "$GITHUB_SHA" \
            --application-wheel-sha256 "$APPLICATION_WHEEL_SHA256" \
            --application-selection-record-sha256 \
              "$APPLICATION_SELECTION_RECORD_SHA256" \
            --require-image-revision

      - name: Upload container distribution evidence
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: >-
            container-evidence-${{ matrix.architecture }}-${{ github.sha }}-attempt-${{ github.run_attempt }}
          path: container-evidence/
          if-no-files-found: warn
          retention-days: 5

      - name: Inventory all high-severity vulnerabilities
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: extra-codeowners:ci-${{ matrix.architecture }}
          fail-build: false
          only-fixed: false
          output-file: vulnerability-report-${{ matrix.architecture }}.json
          output-format: json
          severity-cutoff: high

      - name: Upload vulnerability inventory
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vulnerability-report-${{ matrix.architecture }}
          path: vulnerability-report-${{ matrix.architecture }}.json
          if-no-files-found: error
          retention-days: 14

      - name: Enforce fixable high-severity vulnerability gate
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: extra-codeowners:ci-${{ matrix.architecture }}
          fail-build: true
          only-fixed: true
          output-format: table
          severity-cutoff: high
          vex: .openvex.json
