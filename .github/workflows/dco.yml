name: DCO

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  signoff:
    name: Developer Certificate of Origin
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify every commit sign-off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          failed=0
          while IFS= read -r commit; do
            author="$(git show --no-patch --format='%an <%ae>' "$commit")"
            if ! git show --no-patch --format='%B' "$commit" \
              | grep --fixed-strings --ignore-case --line-regexp \
                "Signed-off-by: $author" >/dev/null; then
              printf 'Commit %s lacks a Signed-off-by line matching its author.\n' "$commit" >&2
              failed=1
            fi
          done < <(git rev-list "${BASE_SHA}..${HEAD_SHA}")
          exit "$failed"
