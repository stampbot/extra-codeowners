---
name: Feature proposal
description: Propose a new capability or a material behavior change.
title: "feat: "
labels:
  - enhancement
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Initial checks
      options:
        - label: I searched existing issues and discussions for this proposal.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the GitHub review or operations gap to solve.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe observable behavior, not only an implementation.
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and failure behavior
      description: Explain who gains authority and how the feature should fail.
    validations:
      required: true
  - type: textarea
    id: operations
    attributes:
      label: Operational impact
      description: Note configuration, migration, scaling, monitoring, or rollback needs.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe other approaches and their trade-offs.
