site_name: Extra CODEOWNERS
site_description: Delegate narrowly scoped CODEOWNERS approvals to trusted GitHub Apps.
site_url: https://extra-codeowners.readthedocs.io/
repo_url: https://github.com/stampbot/extra-codeowners
repo_name: stampbot/extra-codeowners
edit_uri: edit/main/docs/
strict: true

theme:
  name: material
  features:
    - navigation.indexes
    - navigation.sections
    - content.action.edit

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Tutorial:
      - Development installation: tutorials/development-installation.md
  - How-to guides:
      - Register a GitHub App: how-to/register-app.md
      - Configure policy: how-to/configure.md
      - Prepare repository rules: how-to/prepare-repository-rules.md
      - Run the live GitHub contract: how-to/run-live-github-contract.md
      - Prepare a future deployment: how-to/deploy.md
      - Upgrade, back up, and restore: how-to/upgrade.md
      - Operate and recover: how-to/operate.md
      - Respond to dependency audit: how-to/respond-to-dependency-audit.md
      - Review stacked pull requests: how-to/review-stacked-pull-requests.md
      - Review CI container evidence: how-to/review-container-evidence.md
  - Reference:
      - Project status: reference/project-status.md
      - Configuration: reference/configuration.md
      - Checks and evaluation: reference/checks.md
      - DCO evidence contract: reference/dco-evidence.md
      - Command line: reference/cli.md
      - GitHub permissions and events: reference/github-permissions.md
      - HTTP API: reference/http-api.md
      - Database upgrade notes: reference/upgrade-notes.md
      - Container evidence policy: reference/container-evidence-policy.md
      - Container evidence release contract: reference/container-evidence-release-contract.md
      - Immutable release controller contract: reference/immutable-release-controller.md
  - Explanation:
      - Native CODEOWNERS comparison: explanation/native-codeowners.md
      - Architecture: explanation/architecture.md
      - Database migrations: explanation/database-migrations.md
      - Threat model: explanation/threat-model.md
      - Runtime base image decision: explanation/runtime-base.md
      - Container distribution evidence: explanation/container-distribution-evidence.md
      - Property testing: explanation/property-testing.md
