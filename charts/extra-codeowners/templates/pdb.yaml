{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "extra-codeowners.fullname" . }}
  labels:
    {{- include "extra-codeowners.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "extra-codeowners.applicationSelectorLabels" . | nindent 6 }}
{{- end }}
