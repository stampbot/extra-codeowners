{{- if .Values.migrations.enabled }}
{{- include "extra-codeowners.validateValues" . }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "extra-codeowners.fullname" . }}-migrate
  labels:
    {{- include "extra-codeowners.labels" . | nindent 4 }}
    app.kubernetes.io/component: database-migration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
    {{- with .Values.migrations.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  activeDeadlineSeconds: {{ .Values.migrations.activeDeadlineSeconds }}
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migrations.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "extra-codeowners.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: database-migration
    spec:
      automountServiceAccountToken: false
      serviceAccountName: {{ .Values.migrations.serviceAccountName | default "default" }}
      restartPolicy: Never
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "extra-codeowners.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - database
            - migrate
            - --lock-timeout-seconds
            - {{ .Values.migrations.lockTimeoutSeconds | quote }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if or .Values.migrations.existingSecret .Values.migrations.extraEnvFrom }}
          envFrom:
            {{- if .Values.migrations.existingSecret }}
            - secretRef:
                name: {{ .Values.migrations.existingSecret }}
            {{- end }}
            {{- with .Values.migrations.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          env:
            - name: EXTRA_CODEOWNERS_ENVIRONMENT
              value: production
            {{- with .Values.migrations.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- with .Values.migrations.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- with .Values.migrations.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
