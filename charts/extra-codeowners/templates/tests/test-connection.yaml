apiVersion: v1
kind: Pod
metadata:
  name: {{ include "extra-codeowners.fullname" . }}-test-connection
  labels:
    helm.sh/chart: {{ include "extra-codeowners.chart" . }}
    app.kubernetes.io/component: test
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  {{- with .Values.imagePullSecrets }}
  imagePullSecrets:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: health-check
      image: {{ include "extra-codeowners.image" . | quote }}
      imagePullPolicy: {{ .Values.image.pullPolicy }}
      command:
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen(
          "http://{{ include "extra-codeowners.fullname" . }}:{{ .Values.service.port }}/health/live",
          timeout=5)
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
